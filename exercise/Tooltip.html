<!DOCTYPE html>

<html lang="en">
	<head>
		<title>Tooltip</title>
	</head>
	<body>
        <div class="tooltip">
            <p data-tooltip="t1">p1</p>
            <p data-tooltip="t2">p2</p>
            <p data-tooltip="t3">p3</p>

        </div>

        <style>
            .tooltip>p:hover::before{
                content: attr(data-tooltip); 
                position: absolute;
                left:3em;
            }

        </style>
    </body>
</html>
