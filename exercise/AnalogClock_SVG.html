<!DOCTYPE html>

<html lang="en">
	<head>
		<title>Analog Clock</title>
	</head>
	<body>
        <div id="clock-container">
            <svg  xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="-100 -100 800 800">
                <circle class="periphery" cx="300" cy="300" r="300"></circle>
                <circle class="center" cx="300" cy="300" r="10"></circle>

                <g class="scales_bars">
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(0, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(30, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(60, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(90, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(120, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(150, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(180, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(210, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(240, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(270, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(300, 300, 300)"/>
                    <line class="scale__bar" x1="300" y1="0" x2="300" y2="30" transform="rotate(330, 300, 300)"/>
                </g>

                <g class="scales_numbers" transform="translate(80,80)">
                    <!-- <text class="scale__number" x="220" y="0" transform="rotate(0, 300, 300)">12</text>
                    <text class="scale__number" x="440" y="220" transform="rotate(0, 300, 300)">3</text>
                    <text class="scale__number" x="220" y="440" transform="rotate(0, 300, 300)">6</text>
                    <text class="scale__number" x="0" y="220" transform="rotate(0, 300, 300)">9</text> -->
                </g>

                <g class="hands" transform="translate(300, 300)">
                    <line class="hour" x1="0" y1="0" x2="0" y2="-100"/> 
                    <line class="minute" x1="0" y1="0" x2="0" y2="-150"/> 
                    <line class="second" x1="0" y1="0" x2="0" y2="-200"/> 
                </g>
            </svg>  
        </div>

        <script>
             "use strict";

            const HOURHAND = document.querySelector(".hour");
            const MINUTEHAND = document.querySelector(".minute");
            const SECONDHAND = document.querySelector(".second");

            const refreshClock = () => {
                const date = new Date();
                let hour= date.getHours();
                let minute = date.getMinutes();
                let second = date.getSeconds();
                let mSecond = date.getMilliseconds();
                console.log(`Hour: ${hour}   Minutes: ${minute}   Seconds: ${second}`);

                const secondRotation = (second * 1000 + mSecond) / 60 / 1000 * 360;
                const minuteRotation = minute / 60 * 360;
                const hourRotation = (hour * 60 + minute) / 12 / 60 * 360;

                SECONDHAND.setAttribute("transform", `rotate(${secondRotation})`);
                MINUTEHAND.setAttribute("transform", `rotate(${minuteRotation})`);
                HOURHAND.setAttribute("transform", `rotate(${hourRotation})`);

                requestAnimationFrame(refreshClock);
            };

            window.requestAnimationFrame(refreshClock);
        </script>

        <style>
            .periphery{
                fill:transparent;
                stroke: silver;
                stroke-width: 10px;
            }

            .center{
                fill:silver;
            }

            .scale__bar{
                stroke-width: 5px;
                stroke: black;
            }

            .scale__number {
                font: italic 40px serif;
                text-anchor: middle;
            }

            .hands>line {
                stroke: black;
                stroke-width: 3px;
            }

        </style>
    </body>
</html>
